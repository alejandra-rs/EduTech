services:
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_DB: edutech_db
      POSTGRES_USER: admin_edutech
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

  web:
    build: ./backend
    command: python backend/manage.py runserver 0.0.0.0:8000
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    command: celery -A backend.edutech worker -l INFO
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONPATH=/app:/app/backend
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://web:8000
      - VITE_ALLOWED_HOSTS=all
    depends_on:
      - web

volumes:
  postgres_data:
    name: backend_postgres_data
