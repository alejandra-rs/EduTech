services:
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_DB: edutech_db
      POSTGRES_USER: admin_edutech
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

  tailscale:
    image: tailscale/tailscale:latest
    hostname: edutech-app
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_AUTH_ONCE=true
      - TS_USERSPACE=true
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale_data:/var/lib/tailscale
      - tailscale_certs:/tmp/certs
      - ./serve.json:/config/serve.json:ro
    restart: unless-stopped
    depends_on:
      - web
      - frontend

  web:
    build: ./backend
    command: python backend/manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    command: celery -A backend.edutech worker -l INFO
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONPATH=/app:/app/backend
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://host.docker.internal:8000
    depends_on:
      - web

volumes:
  postgres_data:
    name: backend_postgres_data
    external: true
  tailscale_data:
  tailscale_certs:
